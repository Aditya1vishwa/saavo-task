<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- ── Viewport ─────────────────────────────────────────────── -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Primary SEO ──────────────────────────────────────────── -->
  <title>EventNest | AI Mock Interview Platform</title>
  <meta name="description" content="EventNest is the world's first AI-powered interview shadow. Practice realistic AI voice mock interviews, get instant feedback, and ace your next job interview. Recruiters: automate candidate screening at scale." />
  <meta name="keywords" content="EventNest, AI interview, mock interview, AI interview coach, job interview practice, interview preparation, automated screening, AI voice interview, recruiter tool, interview feedback" />
  <meta name="author" content="EventNest" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#004bd6" />
  <meta name="application-name" content="EventNest" />

  <!-- ── Canonical ────────────────────────────────────────────── -->
  <link rel="canonical" href="https://EventNestai.com/" />

  <!-- ── Favicon / Icons ──────────────────────────────────────── -->
  <link rel="icon" type="image/svg+xml" href="/favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />

  <!-- ── Open Graph (Facebook / LinkedIn / WhatsApp) ─────────── -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="EventNest" />
  <meta property="og:title" content="EventNest | AI Mock Interview Platform" />
  <meta property="og:description" content="The world's first AI-powered interview shadow. Practice mock interviews, screen candidates automatically, and ace every interview with real-time AI feedback." />
  <meta property="og:url" content="https://EventNestai.com/" />
  <meta property="og:image" content="https://EventNestai.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="EventNest – AI Mock Interview Platform" />
  <meta property="og:locale" content="en_US" />

  <!-- ── Twitter / X Card ─────────────────────────────────────── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@EventNestAI" />
  <meta name="twitter:creator" content="@EventNestAI" />
  <meta name="twitter:title" content="EventNest | AI Mock Interview Platform" />
  <meta name="twitter:description" content="Practice AI voice interviews, get instant feedback, and land your dream job. Built for candidates and enterprise recruiters." />
  <meta name="twitter:image" content="https://EventNestai.com/og-image.png" />
  <meta name="twitter:image:alt" content="EventNest – AI Mock Interview Platform" />

  <!-- ── Structured Data (JSON-LD) ────────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "EventNest",
    "url": "https://EventNestai.com",
    "description": "AI-powered interview preparation and automated candidate screening platform.",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD",
      "availability": "https://schema.org/InStock"
    },
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "4.9",
      "reviewCount": "2000"
    },
    "publisher": {
      "@type": "Organization",
      "name": "EventNest",
      "url": "https://EventNestai.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://EventNestai.com/favicon.png"
      }
    }
  }
  </script>

  <!-- ── FAQ Structured Data ───────────────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How realistic is the AI voice interview?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Our AI is built on the latest voice synthesis and NLP models, producing conversations nearly indistinguishable from a human recruiter."
        }
      },
      {
        "@type": "Question",
        "name": "Can I use EventNest for technical coding interviews?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Our MCQ and Chat/Voice interfaces support a wide range of technical domains, from LeetCode-style logic to deep system design."
        }
      },
      {
        "@type": "Question",
        "name": "Can the AI call a candidate's phone?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes — for Enterprise/B2B plans, EventNest can initiate outbound AI phone calls to candidates at scale, fully automated."
        }
      },
      {
        "@type": "Question",
        "name": "Is my interview data secure?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "All interview data is encrypted at rest and in transit. We are SOC 2 Type II compliant and do not share user data with third parties."
        }
      }
    ]
  }
  </script>

  <!-- ── Performance: Preconnect external resources ────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
